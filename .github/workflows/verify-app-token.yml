name: Verify App Token
# Throwaway workflow to confirm RELEASE_APP_ID / RELEASE_APP_PRIVATE_KEY org secrets
# and the App installation are correctly wired. Never prints the token. Delete after use.
on:
  push:
    branches: [chore/verify-app-token]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Prove the token works (no secrets printed)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          echo "Installation id: ${{ steps.app-token.outputs.installation-id }}"
          echo "Repos visible to the installation:"
          gh api /installation/repositories --jq '.total_count, (.repositories[].full_name)' | head -20
