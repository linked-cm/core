name: CI

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  # Always reports a passing status so branch protection is satisfied even when
  # build-and-test is skipped (e.g. changeset-release/main version bump PRs).
  ci-gate:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: always()
    steps:
      - name: Check result
        run: |
          if [[ "${{ needs.build-and-test.result }}" == "failure" || "${{ needs.build-and-test.result }}" == "cancelled" ]]; then
            exit 1
          fi

  build-and-test:
    name: Build & Test (internal)
    if: ${{ !(github.event.pull_request.base.ref == 'main' && github.head_ref == 'changeset-release/main') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
